<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SubjectLine Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            background-color: #1e293b;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        h1, h2 {
            color: #ffffff;
        }
        p {
            color: #e2e8f0;
        }
        input, textarea, button {
            font-family: 'Inter', sans-serif;
            padding: 0.5rem;
            margin: 0.5rem 0;
            border-radius: 4px;
            border: none;
            width: 100%;
            box-sizing: border-box;
        }
        button {
            background-color: #6366f1;
            color: #ffffff;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #5550bd;
        }
        a {
            color: #6366f1;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script>
        const CONFIG = {
            GROQ_KEY: 'CONFIG.GROQ_KEY',
            SUPABASE_ANON_KEY: 'YOUR_SUPABASE_ANON_KEY',
            SUPABASE_URL: 'https://your-supabase-url.supabase.co'
        };

        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('landing');
            const [emailContent, setEmailContent] = useState('');
            const [subjectLines, setSubjectLines] = useState([]);
            const [freeUses, setFreeUses] = useState(5);
            const [email, setEmail] = useState('');

            useEffect(() => {
                const savedUses = localStorage.getItem('freeUses');
                if (savedUses) {
                    setFreeUses(parseInt(savedUses, 10));
                }
            }, []);

            const handleGenerateSubjectLines = async () => {
                if (freeUses <= 0) {
                    setView('paywall');
                    posthog.capture('free_limit_hit');
                    return;
                }

                posthog.capture('tool_used');
                setFreeUses(freeUses - 1);
                localStorage.setItem('freeUses', freeUses - 1);

                const response = await fetch('https://api.groq.com/v1/models/llama3-70b/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${CONFIG.GROQ_KEY}`
                    },
                    body: JSON.stringify({
                        prompt: `Generate 5 engaging email subject lines for the following content: ${emailContent}`,
                        max_tokens: 150,
                        temperature: 0.7
                    })
                });

                const data = await response.json();
                const generatedSubjects = data.choices[0].text.trim().split('\n').filter(line => line.trim());
                setSubjectLines(generatedSubjects);
            };

            const handleEmailCapture = async () => {
                posthog.capture('email_captured');
                const supabase = new SupabaseClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
                await supabase.from('leads').insert({ email, source: 'paywall' });
                setFreeUses(freeUses + 3);
                localStorage.setItem('freeUses', freeUses + 3);
                setView('tool');
            };

            return (
                <div className="container">
                    {view === 'landing' && (
                        <>
                            <h1>Craft Irresistible Email Subject Lines in Seconds</h1>
                            <h2>Transform Your Newsletter Open Rates with AI-Powered Subject Line Generation</h2>
                            <p>Step 1: Input Your Email Content (5 seconds) → Step 2: Generate Engaging Subject Lines (10 seconds) → Result: Boosted Open Rates Instantly</p>
                            <button onClick={() => {
                                posthog.capture('tool_opened');
                                setView('tool');
                            }}>Start Crafting Irresistible Subject Lines Now</button>
                        </>
                    )}
                    {view === 'tool' && (
                        <>
                            <h1>Enter Your Email Content</h1>
                            <textarea value={emailContent} onChange={e => setEmailContent(e.target.value)} placeholder="Paste your email content here..."></textarea>
                            <button onClick={handleGenerateSubjectLines}>Generate Subject Lines</button>
                            {subjectLines.length > 0 && (
                                <div>
                                    <h2>Generated Subject Lines</h2>
                                    {subjectLines.map((subject, index) => (
                                        <p key={index}>{subject} - Generated by SubjectLine Pro — email-subject-writer.vercel.app</p>
                                    ))}
                                </div>
                            )}
                            {freeUses === 0 && (
                                <p>Free limit reached. Please consider upgrading for more uses.</p>
                            )}
                        </>
                    )}
                    {view === 'paywall' && (
                        <>
                            <h1>Upgrade to Continue</h1>
                            <p>You've reached the free limit. Upgrade to SubjectLine Pro to continue generating subject lines.</p>
                            <p>Get 3 free uses now by entering your email:</p>
                            <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="Enter your email" />
                            <button onClick={handleEmailCapture}>Get 3 Free Uses</button>
                            <p>Or upgrade now:</p>
                            <a href="https://buy.stripe.com/placeholder-email-subject-writer" target="_blank" rel="noopener noreferrer" onClick={() => posthog.capture('payment_clicked')}>Buy on Stripe</a> | <a href="https://gumroad.com/l/placeholder-email-subject-writer" target="_blank" rel="noopener noreferrer" onClick={() => posthog.capture('payment_clicked')}>Buy on Gumroad</a>
                        </>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('app'));
        root.render(<App />);
    </script>
    <script src="https://js.posthog.com/posthog.min.js"></script>
    <script>
        posthog.init('YOUR_POSTHOG_PROJECT_API_KEY', { api_host: 'https://app.posthog.com' });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@1"></script>
</body>
</html>
